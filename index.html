    <style>

        /* дё»жҢүй’®ж ·ејҸ */

            min-height: 60px; /* зЎ®дҝқжңүи¶іеӨҹзҡ„й«ҳеәҰжҳҫзӨәз»“жһң */
            font-family: 'Arial', sans-serif; /* зЎ®дҝқиҫ“еҮәеӯ—дҪ“дёҖиҮҙ */

<body>
    <h1>вңҲпёҸ иҙ§д»Јж•°жҚ®иҪ¬жҚўеҷЁ</h1>
    <div class="container">
        <!-- д»…дҝ®ж”№иҝҷйҮҢзҡ„placeholderдёә"жЈ’жЈ’пјҒ" -->
        <textarea id="input" placeholder="жЈ’жЈ’пјҒ"></textarea>
        
        <!-- еҝ«жҚ·жҢүй’®еҢәеҹҹпјҲеҚ•зӢ¬дёҖиЎҢпјү -->
        <div class="shortcut-btn-group">
            <button class="shortcut-btn" onclick="fillAirport('FRA')">FRA</button>
            <button class="shortcut-btn" onclick="fillAirport('WAW')">WAW</button>
        </div>
        
        <!-- дёҖй”®еӨҚеҲ¶жҢүй’®пјҲеҚ•зӢ¬дёҖиЎҢпјү -->
        <button class="main-btn" onclick="copyResult()" id="copyBtn">дёҖй”®еӨҚеҲ¶</button>
        
        <div id="result" class="result-box">
            <span class="result-placeholder">иҫ“е…Ҙж•°жҚ®еҗҺдјҡиҮӘеҠЁиҪ¬жҚў...</span>
        </div>
    </div>

    <script>
        // еҝ«жҚ·еЎ«е……жңәеңәд»Јз Ғзҡ„еҮҪж•°
        function fillAirport(airportCode) {
            const inputElement = document.getElementById('input');
            // е…ій”®дҝ®ж”№пјҡеңЁTOжңәеңәд»Јз ҒеҗҺж·»еҠ жҚўиЎҢз¬Ұ\n
            inputElement.value = `TO${airportCode}\n`;
            // иҒҡз„Ұиҫ“е…ҘжЎҶпјҢжҸҗеҚҮз”ЁжҲ·дҪ“йӘҢ
            inputElement.focus();
            // и§ҰеҸ‘е®һж—¶иҪ¬жҚў
            convert();
        }

        // ж”№иҝӣпјҡи§Јжһҗе°әеҜёиЎҢпјҢж”ҜжҢҒдёӨз§Қж јејҸ
        function parseSizeLine(line) {
            // йҰ–е…ҲжҸҗеҸ–йҮҚйҮҸпјҲеҰӮжһңжңүпјүпјҢйҒҝе…Қе№Іжү°е°әеҜёи§Јжһҗ
            const weightRemovedLine = line.replace(/(\d+\.?\d*)\s*(?:kg|kgs|еҚғе…Ӣ|е…¬ж–Ө)/gi, '').trim();
            
            let multiple = 1; // й»ҳи®Ө1д»¶
            let sizeValues = null;
            let unitType = "cm"; // й»ҳи®ӨеҚ•дҪҚ
            
            // ж јејҸ1пјҡе…Ҳе°қиҜ•еҢ№й…Қ "2*30*20*20cm" ж јејҸпјҲ4дёӘж•°еӯ—пјҢз¬¬дёҖдёӘжҳҜд»¶ж•°пјү
            // жӯЈеҲҷпјҡж•°еӯ—+д№ҳеҸ·+ж•°еӯ—+д№ҳеҸ·+ж•°еӯ—+д№ҳеҸ·+ж•°еӯ—+еҚ•дҪҚ
            const format1Regex = /^(\d+)\s*[*xXГ—]\s*(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*(mm|cm|m|MM|CM|M)?/i;
            const format1Match = weightRemovedLine.match(format1Regex);
            
            if (format1Match) {
                // ж јејҸ1пјҡз¬¬дёҖдёӘж•°еӯ—жҳҜд»¶ж•°пјҢеҗҺйқў3дёӘжҳҜе°әеҜё
                multiple = parseInt(format1Match[1]) || 1;
                sizeValues = [format1Match[2], format1Match[3], format1Match[4]];
                
                // зЎ®е®ҡеҚ•дҪҚ
                if (format1Match[5]) {
                    unitType = format1Match[5].toLowerCase();
                }
                
                return {
                    originalLine: line.trim(),
                    pureSizeLine: weightRemovedLine,
                    sizeValues: sizeValues,
                    unitType: unitType,
                    multiple: multiple,
                    format: "format1" // ж Үи®°дёәж јејҸ1
                };
            }
            
            // ж јејҸ2пјҡеҢ№й…Қ "30*20*20cm*2" ж јејҸпјҲ3дёӘе°әеҜёж•°еӯ—пјҢжңҖеҗҺзҡ„*2жҳҜд»¶ж•°пјү
            // е…Ҳе°қиҜ•еҢ№й…ҚжңүеҗҺзјҖд»¶ж•°зҡ„ж јејҸ
            const format2WithSuffixRegex = /(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*(mm|cm|m|MM|CM|M)?\s*[*xXГ—]\s*(\d+)/i;
            const format2WithSuffixMatch = weightRemovedLine.match(format2WithSuffixRegex);
            
            if (format2WithSuffixMatch) {
                // ж јејҸ2жңүеҗҺзјҖд»¶ж•°пјҡеүҚйқў3дёӘжҳҜе°әеҜёпјҢжңҖеҗҺдёҖдёӘжҳҜд»¶ж•°
                sizeValues = [format2WithSuffixMatch[1], format2WithSuffixMatch[2], format2WithSuffixMatch[3]];
                multiple = parseInt(format2WithSuffixMatch[5]) || 1;
                
                // зЎ®е®ҡеҚ•дҪҚ
                if (format2WithSuffixMatch[4]) {
                    unitType = format2WithSuffixMatch[4].toLowerCase();
                }
                
                return {
                    originalLine: line.trim(),
                    pureSizeLine: weightRemovedLine,
                    sizeValues: sizeValues,
                    unitType: unitType,
                    multiple: multiple,
                    format: "format2_suffix" // ж Үи®°дёәж јејҸ2пјҲжңүеҗҺзјҖпјү
                };
            }
            
            // ж јејҸ2пјҡеҢ№й…Қ "30*20*20cm" ж јејҸпјҲ3дёӘе°әеҜёж•°еӯ—пјҢжІЎжңүд»¶ж•°еҗҺзјҖпјҢй»ҳи®Ө1д»¶пјү
            const format2NoSuffixRegex = /(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*(mm|cm|m|MM|CM|M)?/i;
            const format2NoSuffixMatch = weightRemovedLine.match(format2NoSuffixRegex);
            
            if (format2NoSuffixMatch) {
                // ж јејҸ2ж— еҗҺзјҖд»¶ж•°пјҡ3дёӘжҳҜе°әеҜёпјҢй»ҳи®Ө1д»¶
                sizeValues = [format2NoSuffixMatch[1], format2NoSuffixMatch[2], format2NoSuffixMatch[3]];
                multiple = 1; // й»ҳи®Ө1д»¶
                
                // зЎ®е®ҡеҚ•дҪҚ
                if (format2NoSuffixMatch[4]) {
                    unitType = format2NoSuffixMatch[4].toLowerCase();
                }
                
                return {
                    originalLine: line.trim(),
                    pureSizeLine: weightRemovedLine,
                    sizeValues: sizeValues,
                    unitType: unitType,
                    multiple: multiple,
                    format: "format2_no_suffix" // ж Үи®°дёәж јејҸ2пјҲж— еҗҺзјҖпјү
                };
            }
            
            // еҰӮжһңжІЎжңүеҢ№й…ҚеҲ°д»»дҪ•ж јејҸ
            return {
                originalLine: line.trim(),
                pureSizeLine: weightRemovedLine,
                sizeValues: null,
                unitType: "cm",
                multiple: 1,
                format: "unknown"
            };
        }

        // ж”№иҝӣпјҡжё…зҗҶе°әеҜёиЎҢпјҢж”ҜжҢҒдёӨз§Қж јејҸпјҢз”ҹжҲҗж ҮеҮҶе°әеҜёй”®
        function cleanSizeLine(line) {
            // е…Ҳз§»йҷӨйҮҚйҮҸдҝЎжҒҜ
            const lineWithoutWeight = line.replace(/(\d+\.?\d*)\s*(?:kg|kgs|еҚғе…Ӣ|е…¬ж–Ө)/gi, '').trim();
            
            let cleanLine = "";
            let sizeKey = "";
            let multiple = 1;
            
            // е…Ҳе°қиҜ•еҢ№й…Қж јејҸ1пјҡ2*30*20*20cm
            const format1Regex = /^(\d+)\s*[*xXГ—]\s*(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*(mm|cm|m|MM|CM|M)?/i;
            const format1Match = lineWithoutWeight.match(format1Regex);
            
            if (format1Match) {
                multiple = parseInt(format1Match[1]) || 1;
                const dim1 = format1Match[2];
                const dim2 = format1Match[3];
                const dim3 = format1Match[4];
                let unit = "cm";
                
                if (format1Match[5]) {
                    unit = format1Match[5].toLowerCase();
                }
                
                // з”ҹжҲҗж ҮеҮҶе°әеҜёй”®пјҲз”ЁдәҺеҗҲе№¶пјү
                sizeKey = `${dim1}*${dim2}*${dim3}${unit}`;
                cleanLine = `${dim1}*${dim2}*${dim3}${unit}`;
                if (multiple > 1) {
                    cleanLine += `*${multiple}`;
                }
                
                return { cleanLine, sizeKey, multiple };
            }
            
            // е°қиҜ•еҢ№й…Қж јејҸ2пјҡ30*20*20cm*2 жҲ– 30*20*20cm
            const format2WithSuffixRegex = /(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*(mm|cm|m|MM|CM|M)?\s*[*xXГ—]\s*(\d+)/i;
            const format2WithSuffixMatch = lineWithoutWeight.match(format2WithSuffixRegex);
            
            if (format2WithSuffixMatch) {
                const dim1 = format2WithSuffixMatch[1];
                const dim2 = format2WithSuffixMatch[2];
                const dim3 = format2WithSuffixMatch[3];
                multiple = parseInt(format2WithSuffixMatch[5]) || 1;
                let unit = "cm";
                
                if (format2WithSuffixMatch[4]) {
                    unit = format2WithSuffixMatch[4].toLowerCase();
                }
                
                // з”ҹжҲҗж ҮеҮҶе°әеҜёй”®пјҲз”ЁдәҺеҗҲе№¶пјү
                sizeKey = `${dim1}*${dim2}*${dim3}${unit}`;
                cleanLine = `${dim1}*${dim2}*${dim3}${unit}`;
                if (multiple > 1) {
                    cleanLine += `*${multiple}`;
                }
                
                return { cleanLine, sizeKey, multiple };
            }
            
            // еҢ№й…Қж јејҸ2ж— еҗҺзјҖпјҡ30*20*20cm
            const format2NoSuffixRegex = /(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*[*xXГ—]\s*(\d+\.?\d*)\s*(mm|cm|m|MM|CM|M)?/i;
            const format2NoSuffixMatch = lineWithoutWeight.match(format2NoSuffixRegex);
            
            if (format2NoSuffixMatch) {
                const dim1 = format2NoSuffixMatch[1];
                const dim2 = format2NoSuffixMatch[2];
                const dim3 = format2NoSuffixMatch[3];
                let unit = "cm";
                
                if (format2NoSuffixMatch[4]) {
                    unit = format2NoSuffixMatch[4].toLowerCase();
                }
                
                // з”ҹжҲҗж ҮеҮҶе°әеҜёй”®пјҲз”ЁдәҺеҗҲе№¶пјү
                sizeKey = `${dim1}*${dim2}*${dim3}${unit}`;
                cleanLine = `${dim1}*${dim2}*${dim3}${unit}`;
                
                return { cleanLine, sizeKey, multiple: 1 };
            }
            
            // еҰӮжһңжІЎжңүеҢ№й…ҚеҲ°д»»дҪ•ж јејҸпјҢиҝ”еӣһеҺҹе§ӢиЎҢпјҲз§»йҷӨйҮҚйҮҸеҗҺпјү
            sizeKey = lineWithoutWeight;
            cleanLine = lineWithoutWeight;
            return { cleanLine, sizeKey, multiple: 1 };
        }

        // дҝ®еӨҚпјҡдҪ“з§ҜеҚ•дҪҚжҚўз®—ж ёеҝғеҮҪж•°
        function calculateSizeToCBM(sizeValues, unitType) {
            if (!sizeValues) return 0;
            
            let l = parseFloat(sizeValues[0]);
            let w = parseFloat(sizeValues[1]);
            let h = parseFloat(sizeValues[2]);
            
            // ж №жҚ®еҚ•дҪҚиҪ¬жҚўдёәзұіпјҲеӣ дёәCBMжҳҜз«Ӣж–№зұіпјү
            switch (unitType.toLowerCase()) {
                case "mm":
                    // жҜ«зұіиҪ¬зұіпјҡйҷӨд»Ҙ1000
                    l = l / 1000;
                    w = w / 1000;
                    h = h / 1000;
                    break;
                case "cm":
                    // еҺҳзұіиҪ¬зұіпјҡйҷӨд»Ҙ100
                    l = l / 100;
                    w = w / 100;
                    h = h / 100;
                    break;
                case "m":
                default:
                    // е·Із»ҸжҳҜзұіпјҢж— йңҖиҪ¬жҚў
                    break;
            }
            
            // и®Ўз®—еҚ•д»¶дҪ“з§ҜпјҲз«Ӣж–№зұіпјү
            const volumeM3 = l * w * h;
            return volumeM3;
        }

        // дҝ®ж”№пјҡе®һж—¶иҪ¬жҚўеҮҪж•° - еңЁиҫ“еҮәж—¶еҗҲе№¶зӣёеҗҢе°әеҜё
        function convert() {
            const text = document.getElementById('input').value.trim();
            const resultElement = document.getElementById('result');
            
            // еҰӮжһңиҫ“е…Ҙдёәз©әпјҢжҳҫзӨәжҸҗзӨәдҝЎжҒҜ
            if (!text) {
                resultElement.innerHTML = '<span class="result-placeholder">иҫ“е…Ҙж•°жҚ®еҗҺдјҡиҮӘеҠЁиҪ¬жҚў...</span>';
                return;
            }
            
            let output = "";
            
            // дҝ®еӨҚ1пјҡдјҳеҢ–е°Ҹж•°зӮ№жӣҝжҚў - еҢ№й…Қ"ж•°еӯ—,ж•°еӯ—"ж јејҸзҡ„йҖ—еҸ·пјҲж¬§жҙІе°Ҹж•°зӮ№пјү
            // е…ҲжӣҝжҚў"ж•°еӯ—,ж•°еӯ—"дёӯзҡ„йҖ—еҸ·дёәзӮ№пјҢеҶҚжӣҝжҚўе…¶д»–еӨҡдҪҷйҖ—еҸ·
            let cleanedText = text.replace(/(\d+),(\d+)/g, '$1.$2'); // еӨ„зҗҶ 0,73 вҶ’ 0.73
            cleanedText = cleanedText.replace(/,/g, ''); // з§»йҷӨеү©дҪҷзҡ„йҖ—еҸ·
            
            // жҢүиЎҢжӢҶеҲҶж–Үжң¬пјҢиҝҮж»Өз©әиЎҢ
            const lines = cleanedText.split('\n').map(line => line.trim()).filter(line => line);
            
            // 1. жҸҗеҸ–жңәеңәд»Јз Ғ
            let airport = "???";
            const airportRegex = /(?:to|TO|POD:|AOL:|Delivery:|Destination:|йЈһ|зӣ®зҡ„ең°)\s*([A-Z]{3})\b/i;
            for (let line of lines) {
                const match = line.match(airportRegex);
                if (match) {
                    airport = match[1];
                    break;
                }
            }

            // 2. жҸҗеҸ–йҮҚйҮҸпјҲйҮҚжһ„и§„еҲҷпјҡе…је®№жӣҙеӨҡиҙ§д»ЈйҮҚйҮҸж јејҸпјү
            let totalWeight = null; // жҖ»йҮҚпјҲжүҖжңүйқһеҚ•д»¶йҮҚзҡ„йҮҚйҮҸпјү
            let singleWeight = null; // еҚ•д»¶йҮҚпјҲеёҰ/д»¶/з®ұж ҮиҜҶзҡ„йҮҚйҮҸпјү
            
            // еҢ№й…ҚеҚ•д»¶йҮҚпјҲеёҰ/д»¶/з®ұж ҮиҜҶпјү- дјҳе…Ҳзә§жңҖдҪҺ
            const singleWeightRegex = /(\d+\.?\d*)\s*(?:kg|kgs|еҚғе…Ӣ|е…¬ж–Ө)\s*\/?\s*(?:ctn|д»¶|з®ұ)/i;
            // еҢ№й…ҚжҖ»йҮҚпјҲе…је®№пјҡзәҜйҮҚйҮҸиЎҢгҖҒеёҰgross weight/net weightзӯүеүҚзјҖзҡ„йҮҚйҮҸиЎҢпјү
            const totalWeightRegex = /(\d+\.?\d*)\s*(?:kg|kgs|еҚғе…Ӣ|е…¬ж–Ө)/i;
            
            // е…ҲеӨ„зҗҶйҮҚйҮҸпјҢйҒҝе…Қиў«е°әеҜёиЎҢе№Іжү°
            for (let line of lines) {
                // е…ҲжЈҖжҹҘжҳҜеҗҰжҳҜеҚ•д»¶йҮҚ
                const singleMatch = line.match(singleWeightRegex);
                if (singleMatch && !singleWeight) {
                    singleWeight = parseFloat(singleMatch[1]);
                    continue; // еҚ•д»¶йҮҚдёҚеҸӮдёҺжҖ»йҮҚеҢ№й…Қ
                }
                
                // еҶҚеҢ№й…ҚжҖ»йҮҚпјҲеҸӘиҰҒеҢ…еҗ«"ж•°еӯ—+kg"е°ұжҸҗеҸ–пјҢдёҚз®ЎеүҚзјҖпјү
                if (!totalWeight) { // еҸӘжҸҗеҸ–з¬¬дёҖдёӘеҢ№й…ҚеҲ°зҡ„жҖ»йҮҚ
                    const totalMatch = line.match(totalWeightRegex);
                    if (totalMatch) {
                        totalWeight = parseFloat(totalMatch[1]);
                    }
                }
            }

            // 3. жҸҗеҸ–д»¶ж•°пјҲдјҳе…Ҳе…ій”®иҜҚпјү - еўһејәеҢ№й…Қ
            let cases = 0;
            const casesRegex = /(\d+)\s*(?:crts?|ctns?|plts?|pkgs?|boxes?|box?|cases?|д»¶|з®ұ|pallets?|tents?|x\s*Pallets?|xPallets?|carts?|karts?|PALETY?|Cartons?|packages?|Crates?|crate?|pcs|Palls?|pal?|colis?|collis?|rolls?|pieces?)/i;
            
            // зү№еҲ«еӨ„зҗҶ "total 80 CTN" иҝҷз§Қж јејҸ
            const totalCasesRegex = /(?:total|TOTAL|жҖ»и®Ў|еҗҲи®Ў|дёҖе…ұ|е…ұ)\s*(\d+)\s*(?:crts?|ctns?|plts?|pkgs?|boxes?|cases?|д»¶|з®ұ)/i;
            
            for (let line of lines) {
                // е…ҲеҢ№й…ҚеёҰ"total"е…ій”®иҜҚзҡ„
                const totalMatch = line.match(totalCasesRegex);
                if (totalMatch) {
                    cases = parseInt(totalMatch[1]);
                    break;
                }
                
                // еҶҚеҢ№й…Қжҷ®йҖҡд»¶ж•°
                const match = line.match(casesRegex);
                if (match && !cases) { // йҒҝе…Қиў«еҗҺйқўзҡ„йқһе…ій”®еҢ№й…ҚиҰҶзӣ–
                    cases = parseInt(match[1]);
                }
            }

            // 4. ж–°еўһзӣҙжҺҘиҜҶеҲ«CBMзҡ„йҖ»иҫ‘пјҲдјҳе…ҲиҜ»еҸ–зҺ°жҲҗзҡ„CBMеҖјпјү
            let directCBM = 0;
            const cbmRegex = /(\d+\.?\d*)\s*(?:cbm|CBM|з«Ӣж–№зұі|ж–№)/i;
            for (let line of lines) {
                const match = line.match(cbmRegex);
                if (match) {
                    directCBM = parseFloat(match[1]);
                    break;
                }
            }

            // 5. и§Јжһҗе°әеҜёиЎҢпјҢиҺ·еҸ–еҚ•д»¶е°әеҜёдҝЎжҒҜ
            let sizeLinesInfo = [];
            let allSizeLines = []; // еӯҳеӮЁжүҖжңүе°әеҜёиЎҢзҡ„еҺҹе§Ӣж–Үжң¬
            
            // йҮҚиҰҒпјҡж— и®әжҳҜеҗҰжңүзӣҙжҺҘCBMпјҢйғҪиҰҒи§Јжһҗе°әеҜёиЎҢ
            for (let line of lines) {
                // еҢ№й…ҚдёӨз§Қж јејҸзҡ„е°әеҜёиЎҢ
                // ж јејҸ1пјҡ2*30*20*20cm
                // ж јејҸ2пјҡ30*20*20cm*2 жҲ– 30*20*20cm
                const sizePattern1 = /^\d+\s*[*xXГ—]\s*\d+.*[*xXГ—].*[*xXГ—].*\d+/i; // ж јејҸ1пјҡ4дёӘж•°еӯ—
                const sizePattern2 = /\d+.*[*xXГ—].*[*xXГ—].*\d+/i; // ж јејҸ2пјҡиҮіе°‘3дёӘж•°еӯ—
                
                if (sizePattern1.test(line) || sizePattern2.test(line)) {
                    const sizeInfo = parseSizeLine(line);
                    if (sizeInfo.sizeValues) {
                        sizeLinesInfo.push(sizeInfo);
                        // дҝқеӯҳжүҖжңүе°әеҜёиЎҢзҡ„еҺҹе§Ӣж–Үжң¬
                        allSizeLines.push(sizeInfo.originalLine);
                    }
                }
            }

            // 6. и®Ўз®—жҖ»д»¶ж•°е’ҢжҖ»дҪ“з§ҜпјҲе…ій”®ж”№иҝӣпјү
            let totalCasesFromSizes = 0; // д»ҺжүҖжңүе°әеҜёиЎҢи®Ўз®—зҡ„д»¶ж•°
            let totalVolumeFromSizes = 0; // д»ҺжүҖжңүе°әеҜёиЎҢи®Ўз®—зҡ„жҖ»дҪ“з§Ҝ
            
            // йҒҚеҺҶжүҖжңүе°әеҜёиЎҢпјҢи®Ўз®—жҜҸиЎҢзҡ„дҪ“з§Ҝе’Ңд»¶ж•°
            for (const sizeInfo of sizeLinesInfo) {
                if (sizeInfo.sizeValues) {
                    // и®Ўз®—иҜҘе°әеҜёзҡ„еҚ•д»¶дҪ“з§Ҝ
                    const singleCBM = calculateSizeToCBM(sizeInfo.sizeValues, sizeInfo.unitType);
                    // иҜҘиЎҢзҡ„жҖ»д»¶ж•°
                    const lineCases = sizeInfo.multiple || 1;
                    // иҜҘиЎҢзҡ„жҖ»дҪ“з§Ҝ = еҚ•д»¶дҪ“з§Ҝ Г— д»¶ж•°
                    totalVolumeFromSizes += singleCBM * lineCases;
                    // зҙҜи®ЎжҖ»д»¶ж•°
                    totalCasesFromSizes += lineCases;
                }
            }
            
            // 7. зЎ®е®ҡжңҖз»Ҳд»¶ж•° - дјҳе…Ҳзә§пјҡ1.е…ій”®иҜҚд»¶ж•° 2.е°әеҜёиЎҢи®Ўз®—зҡ„д»¶ж•° 3.й»ҳи®Ө1
            let finalCases = 0;
            if (cases > 0) {
                finalCases = cases; // дјҳе…ҲдҪҝз”ЁиҜҶеҲ«зҡ„д»¶ж•°е…ій”®иҜҚ
            } else if (totalCasesFromSizes > 0) {
                finalCases = totalCasesFromSizes; // дҪҝз”ЁжүҖжңүе°әеҜёиЎҢдёӯзҡ„д»¶ж•°жҖ»е’Ң
            }
            
            // еҰӮжһңд»Қз„¶жІЎжңүд»¶ж•°пјҢй»ҳи®Өдёә1
            if (finalCases === 0) finalCases = 1;
            
            // 8. и®Ўз®—жҖ»CBM
            let totalCBM = directCBM; // дјҳе…ҲдҪҝз”ЁзӣҙжҺҘиҜҶеҲ«зҡ„CBM
            
            // еҰӮжһңжңүзӣҙжҺҘCBMпјҢзӣҙжҺҘдҪҝз”Ё
            if (directCBM > 0) {
                totalCBM = directCBM;
            } 
            // еҰӮжһңжңүд»Һе°әеҜёиЎҢи®Ўз®—зҡ„дҪ“з§ҜпјҢдҪҝз”Ёе®ғ
            else if (totalVolumeFromSizes > 0) {
                totalCBM = totalVolumeFromSizes;
            }
            // еҰӮжһңжңүе°әеҜёдҝЎжҒҜе’ҢжҖ»д»¶ж•°пјҢдҪҶеүҚйқўжІЎи®Ўз®—дҪ“з§ҜпјҲж—§йҖ»иҫ‘пјү
            else if (cases > 0 && sizeLinesInfo.length > 0) {
                // дҪҝз”Ёз¬¬дёҖдёӘе°әеҜёиЎҢзҡ„еҚ•д»¶дҪ“з§ҜГ—жҖ»д»¶ж•°
                const firstSizeInfo = sizeLinesInfo[0];
                if (firstSizeInfo.sizeValues) {
                    const singleCBM = calculateSizeToCBM(firstSizeInfo.sizeValues, firstSizeInfo.unitType);
                    totalCBM = singleCBM * cases;
                }
            }
            
            // йҮҚйҮҸи®Ўз®—йҖ»иҫ‘пјҡдјҳе…ҲжҖ»йҮҚпјҢж— еҲҷз”ЁеҚ•д»¶йҮҚГ—д»¶ж•°
            let finalWeight = null;
            if (totalWeight) {
                // жңүжҖ»йҮҚ вҶ’ зӣҙжҺҘдҪҝз”ЁпјҢдёҚд№ҳд»¶ж•°
                finalWeight = totalWeight;
            } else if (singleWeight) {
                // еҸӘжңүеҚ•д»¶йҮҚ вҶ’ д№ҳд»Ҙд»¶ж•°
                finalWeight = singleWeight * finalCases;
            }

            // 9. и®Ўз®—жңҖз»ҲCBMпјҲдҝқз•ҷ2дҪҚе°Ҹж•°пјҢиҙ§д»ЈйҖҡеёёз”Ё2дҪҚпјү
            const finalCBM = parseFloat(totalCBM).toFixed(2);
            // еҜҶеәҰжҜ”пјҲйҮҚйҮҸ/CBMпјҢеӣӣиҲҚдә”е…ҘеҸ–ж•ҙпјү
            const densityRatio = finalWeight && parseFloat(finalCBM) > 0 ? Math.round(finalWeight / parseFloat(finalCBM)) : "";

            // 10. жӢјжҺҘиҫ“еҮәпјҲз®ҖеҢ–зүҲпјү
            if (finalWeight) {
                output += `${airport} / ${finalCases}pcs / ${finalWeight.toFixed(1)}kgs / ${finalCBM}cbm`;
            } else {
                output += `${airport} / ${finalCases}pcs / ?kgs / ${finalCBM}cbm`;
            }
            
            // 11. е…ій”®ж”№иҝӣпјҡеңЁиҫ“еҮәж—¶еҗҲе№¶зӣёеҗҢе°әеҜё
            let mergedSizes = new Map(); // з”ЁдәҺеҗҲе№¶зӣёеҗҢе°әеҜё
            
            // жё…зҗҶжүҖжңүе°әеҜёиЎҢпјҢе№¶еҗҲе№¶зӣёеҗҢе°әеҜё
            for (let line of lines) {
                const sizePattern1 = /^\d+\s*[*xXГ—]\s*\d+.*[*xXГ—].*[*xXГ—].*\d+/i;
                const sizePattern2 = /\d+.*[*xXГ—].*[*xXГ—].*\d+/i;
                
                if (sizePattern1.test(line) || sizePattern2.test(line)) {
                    const cleanedData = cleanSizeLine(line);
                    
                    if (cleanedData.sizeKey) {
                        // жҸҗеҸ–еҹәзЎҖе°әеҜёпјҲдёҚеёҰд»¶ж•°пјү
                        const baseSizeMatch = cleanedData.sizeKey.match(/^([^*]+(?:\*[^*]+){2}[a-z]*)/i);
                        if (baseSizeMatch) {
                            const baseSize = baseSizeMatch[0];
                            const currentMultiple = cleanedData.multiple || 1;
                            
                            if (mergedSizes.has(baseSize)) {
                                // е·ІжңүзӣёеҗҢе°әеҜёпјҢзҙҜеҠ д»¶ж•°
                                const existing = mergedSizes.get(baseSize);
                                existing.totalMultiple += currentMultiple;
                                mergedSizes.set(baseSize, existing);
                            } else {
                                // ж–°е°әеҜёпјҢж·»еҠ еҲ°map
                                mergedSizes.set(baseSize, {
                                    baseSize: baseSize,
                                    totalMultiple: currentMultiple
                                });
                            }
                        }
                    }
                }
            }
            
            // 12. з”ҹжҲҗеҗҲе№¶еҗҺзҡ„е°әеҜёиЎҢ
            let allCleanSizeLines = [];
            for (const [baseSize, data] of mergedSizes) {
                let cleanLine = baseSize;
                if (data.totalMultiple > 1) {
                    cleanLine += `*${data.totalMultiple}`;
                }
                allCleanSizeLines.push(cleanLine);
            }
            
            // ж·»еҠ жүҖжңүе°әеҜёдҝЎжҒҜпјҲеҰӮжһңжңүеӨҡдёӘе°әеҜёпјү- дҪҝз”ЁеҗҲе№¶еҗҺзҡ„е°әеҜёиЎҢ
            if (allCleanSizeLines.length > 0) {
                // з”Ёдёӯж–ҮйҖ—еҸ·иҝһжҺҘжүҖжңүжё…зҗҶеҗҺзҡ„е°әеҜёиЎҢ
                output += `\n${allCleanSizeLines.join('пјҢ')}`;
            }
            
            // ж·»еҠ еҜҶеәҰжҜ”пјҲеҰӮжһңжңүпјү
            if (densityRatio) {
                if (allCleanSizeLines.length > 0) {
                    output += `\n1:${densityRatio}`;
                } else {
                    output += `\n1:${densityRatio}`;
                }
            }
            
            // иҜҶеҲ«еӨұиҙҘжҸҗзӨәпјҲж— йҮҚйҮҸдё”ж— CBMпјү
            if (!finalWeight && directCBM === 0 && sizeLinesInfo.length === 0) {
                output = "ж•°жҚ®иҜҶеҲ«еӨұиҙҘпјҢиҜ·жЈҖжҹҘжҳҜеҗҰеҢ…еҗ«пјҡ\n- йҮҚйҮҸпјҲеҰӮ93.5kgжҲ–13.5kg/д»¶пјү\n- е°әеҜёпјҲеҰӮ29*17*19CMпјүжҲ–CBMпјҲеҰӮ0.75cbmпјү\n- зӣ®зҡ„ең°пјҲеҰӮto FRAпјү\n- д»¶ж•°пјҲеҰӮtotal 80 CTNпјү\n\nж”ҜжҢҒзҡ„еҚ•дҪҚпјҡmm, cm, m";
            }
            
            resultElement.textContent = output;
        }

        // ж–°еўһпјҡдёҖй”®еӨҚеҲ¶еҮҪж•°
        function copyResult() {
            const resultElement = document.getElementById('result');
            const copyBtn = document.getElementById('copyBtn');
            
            // иҺ·еҸ–зәҜж–Үжң¬з»“жһң
            const textToCopy = resultElement.textContent;
            
            // жЈҖжҹҘжҳҜеҗҰжңүжңүж•ҲеҶ…е®№пјҲдёҚжҳҜжҸҗзӨәдҝЎжҒҜпјү
            if (textToCopy.includes("иҫ“е…Ҙж•°жҚ®еҗҺдјҡиҮӘеҠЁиҪ¬жҚў") || textToCopy.includes("ж•°жҚ®иҜҶеҲ«еӨұиҙҘ")) {
                return; // дёҚеӨҚеҲ¶жҸҗзӨәдҝЎжҒҜ
            }
            
            // дҪҝз”ЁзҺ°д»ЈеүӘиҙҙжқҝAPI
            navigator.clipboard.writeText(textToCopy)
                .then(() => {
                    // жҳҫзӨәеӨҚеҲ¶жҲҗеҠҹеҸҚйҰҲ
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = "е·ІеӨҚеҲ¶ вң“";
                    copyBtn.classList.add('copied');
                    
                    // 2з§’еҗҺжҒўеӨҚеҺҹзҠ¶
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.classList.remove('copied');
                    }, 2000);
                })
                .catch(err => {
                    // еӨҮз”Ёж–№жЎҲпјҡдҪҝз”Ёдј з»ҹж–№жі•
                    const textArea = document.createElement('textarea');
                    textArea.value = textToCopy;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    
                    // жҳҫзӨәеӨҚеҲ¶жҲҗеҠҹеҸҚйҰҲ
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = "е·ІеӨҚеҲ¶ вң“";
                    copyBtn.classList.add('copied');
                    
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.classList.remove('copied');
                    }, 2000);
                });
        }

        // ж–°еўһпјҡе®һж—¶иҪ¬жҚўзӣ‘еҗ¬
        document.addEventListener('DOMContentLoaded', function() {
            const inputElement = document.getElementById('input');
            
            // зӣ‘еҗ¬иҫ“е…ҘдәӢд»¶пјҢе®һзҺ°е®һж—¶иҪ¬жҚў
            inputElement.addEventListener('input', convert);
            
            // зӣ‘еҗ¬зІҳиҙҙдәӢд»¶пјҢзІҳиҙҙеҗҺиҮӘеҠЁиҪ¬жҚў
            inputElement.addEventListener('paste', function() {
                // з”ЁsetTimeoutзЎ®дҝқзІҳиҙҙе®ҢжҲҗеҗҺеҶҚиҪ¬жҚў
                setTimeout(convert, 10);
            });
            
            // еҲқе§ӢиҪ¬жҚўпјҲеҰӮжһңжңүеҶ…е®№пјү
            convert();
        });
    </script>
